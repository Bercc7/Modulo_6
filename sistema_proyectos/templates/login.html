<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="asset/css/styles.css" />
</head>
<body>
  <main class="login-page" aria-labelledby="login-title">
    <section class="login-card" aria-label="Formulario de acceso">
      <header class="login-header">
        <div class="brand-badge" aria-hidden="true">🔐</div>
        <h1 id="login-title">Bienvenido</h1>
        <p class="subtitle">Accede con tu correo y contraseña</p>
      </header>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            inputmode="email"
            autocomplete="email"
            placeholder="ejemplo@correo.com"
            aria-describedby="emailHelp emailError"
            required
          />
          <small id="emailHelp" class="helper-text">Usa tu correo institucional o personal.</small>
          <small id="emailError" class="error-text" aria-live="polite"></small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Ingresa tu contraseña"
              aria-describedby="passwordHelp passwordError"
              required
              minlength="8"
            />
            <button
              type="button"
              class="toggle-password"
              id="togglePassword"
              aria-label="Mostrar contraseña"
              aria-pressed="false"
            >
              Mostrar
            </button>
          </div>
          <small id="passwordHelp" class="helper-text">Debe tener al menos 8 caracteres.</small>
          <small id="passwordError" class="error-text" aria-live="polite"></small>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" />
            <span>Recordarme</span>
          </label>

          <a href="#" class="link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Iniciar sesión</span>
        </button>

        <p id="formMessage" class="form-message" aria-live="polite"></p>
      </form>

      <footer class="login-footer">
        <p>¿No tienes cuenta? <a href="#" class="link">Crear una cuenta</a></p>
      </footer>
    </section>
  </main>

  <script src="asset/js/login.js"></script>
</body>
</html>
