{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio - Sistema de Proyectos</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  <style>
    .home-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .home-card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(31, 38, 135, 0.12);
      border: 1px solid rgba(202, 196, 208, 0.4);
      text-align: center;
    }

    .home-card h1 {
      margin-bottom: 12px;
    }

    .home-card p {
      color: #49454f;
      margin-bottom: 10px;
    }

    .home-user {
      background: #f6f3fb;
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }

    .logout-btn {
      min-height: 48px;
      border: none;
      border-radius: 999px;
      background: #6750a4;
      color: white;
      padding: 0 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.25s ease;
    }

    .logout-btn:hover {
      background: #5b4692;
    }
  </style>
</head>
<body>
  <main class="home-page">
    <section class="home-card">
      <h1>¡Hola, {{ user.username }}!</h1>
      <p>Has iniciado sesión correctamente.</p>

      <div class="home-user">
        <p><strong>ID de sistema:</strong> {{ user.id }}</p>
        <p><strong>Usuario:</strong> {{ user.username }}</p>
        <p><strong>Correo:</strong> {{ user.email|default:"No registrado" }}</p>
        <p><strong>Último acceso:</strong> {{ user.last_login|date:"d/m/Y H:i" }}</p>
      </div>

      <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="logout-btn">Cerrar sesión</button>
      </form>
    </section>
  </main>
</body>
</html>
